<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <!-- SVG favicon for browser tab -->
    <link rel="icon" type="image/svg+xml" href="%PUBLIC_URL%/hearth-icon.svg" />
    <!-- iOS home screen icon — SVG works on iOS 15.4+ Safari -->
    <link rel="apple-touch-icon" href="%PUBLIC_URL%/hearth-icon.svg" />
    <!-- Android / PWA -->
    <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />
    <!--
      IMPORTANT: initial-scale=1 (no viewport-fit=cover) keeps the header
      below the Dynamic Island / notch. The CSS uses env(safe-area-inset-top)
      in the sticky header to add the correct top padding automatically.
    -->
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <!-- Terracotta brand color for Android chrome / task switcher -->
    <meta name="theme-color" content="#B8522A" />
    <!-- iOS PWA fullscreen settings -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <!--
      default = status bar shows above app (safe, header stays clear of island)
      black-translucent = full bleed but YOU must handle safe areas yourself
      Using "default" here because it's simpler and always readable.
    -->
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Hearth" />
    <meta name="description" content="Hearth — your personal cookbook" />
    <title>Hearth</title>
  </head>
  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root"></div>
  </body>
</html>
